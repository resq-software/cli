# Crate labels
"crate:cli":
  - changed-files:
    - any-glob-to-any-file: cli/**/*

"crate:tui":
  - changed-files:
    - any-glob-to-any-file: resq-tui/**/*

"crate:bin-explorer":
  - changed-files:
    - any-glob-to-any-file: bin-explorer/**/*

"crate:cleanup":
  - changed-files:
    - any-glob-to-any-file: cleanup/**/*

"crate:deploy-cli":
  - changed-files:
    - any-glob-to-any-file: deploy-cli/**/*

"crate:flame-graph":
  - changed-files:
    - any-glob-to-any-file: flame-graph/**/*

"crate:health-checker":
  - changed-files:
    - any-glob-to-any-file: health-checker/**/*

"crate:log-viewer":
  - changed-files:
    - any-glob-to-any-file: log-viewer/**/*

"crate:perf-monitor":
  - changed-files:
    - any-glob-to-any-file: perf-monitor/**/*

# Governance & CI
"A-DevOps":
  - changed-files:
    - any-glob-to-any-file: .github/**/*

"C-Documentation":
  - changed-files:
    - any-glob-to-any-file: "**/*.md"
    - any-glob-to-any-file: docs/**/*
